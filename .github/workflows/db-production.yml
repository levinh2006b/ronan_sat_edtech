name: Database Production

permissions:
  contents: read

on:
  workflow_run:
    workflows: ["Database CI"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

jobs:
  check-workflow:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    steps:
      - run: echo "Database CI succeeded"

  migrate:
    needs: [check-workflow]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: supabase-production-migrations
      cancel-in-progress: false
    environment: Action Production
    env:
      DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - uses: supabase/setup-cli@v1
        with:
          version: 2.92.1

      - name: Link production Supabase project
        run: bunx dotenvx run -f .env.production --ignore=MISSING_ENV_FILE -- supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push migrations to production
        run: bun run supabase:db:push:production
